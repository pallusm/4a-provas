    const COLORS = {
      "matemática":"#0A7CFF",
      "português":"#25B960",
      "língua":"#25B960",
      "história":"#FF3B30",
      "geografia":"#AF52DE",
      "ciências":"#FF9500",
      "inglês":"#00A6C8",
      "l.e.m":"#00A6C8",
      "projeto":"#BF7A00",
      "arte":"#FF2D55",
      "tecnológica":"#5856D6",
      "física":"#30D158"
    };

    function asText(v){ return (v || "").toString(); }
    function cleanText(t){
      return asText(t)
        .replace(/^[-•\s]+/, "")
        .replace(/\s+/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .trim();
    }
    function hasDate(item){ return !!item && !!item.prazo && !item.sem_prazo; }
    function parseDate(p){
      if(!p) return null;
      const a = p.split("-").map(Number);
      return new Date(a[0], a[1]-1, a[2]);
    }
    function today(){
      const d = new Date();
      d.setHours(0,0,0,0);
      return d;
    }
    function diffDays(item){
      if(!hasDate(item)) return 9999;
      const d = parseDate(item.prazo);
      d.setHours(0,0,0,0);
      return Math.round((d - today()) / 86400000);
    }
    function isPast(item){ return hasDate(item) && diffDays(item) < 0; }
    function isFuture(item){ return !isPast(item); }
    function dateLabel(item){
      if(!hasDate(item)) return item.prazo_tipo === "proxima_aula" ? "Próxima aula" : "Sem prazo definido";
      const d = parseDate(item.prazo);
      return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()] + ", " + d.toLocaleDateString("pt-BR");
    }
    function shortSubject(disc){
      const original = asText(disc);
      const s = original.toLowerCase();
      if(s.includes("matemática")) return "Matemática";
      if(s.includes("português") || s.includes("língua")) return "Português";
      if(s.includes("história")) return "História";
      if(s.includes("geografia")) return "Geografia";
      if(s.includes("ciências")) return "Ciências";
      if(s.includes("inglês") || s.includes("l.e.m")) return original.includes("—") ? original : "Inglês";
      if(s.includes("projeto")) return "Projeto de Vida";
      if(s.includes("arte")) return "Arte";
      if(s.includes("tecnológica")) return "Tecnologia";
      if(s.includes("física")) return "Ed. Física";
      return original || "Disciplina";
    }
    function colorFor(disc){
      const s = asText(disc).toLowerCase();
      for(const k in COLORS){ if(s.includes(k)) return COLORS[k]; }
      return "#8e8e93";
    }
    function sortItems(items){
      return [...items].sort((a,b) => diffDays(a) - diffDays(b) || shortSubject(a.disciplina).localeCompare(shortSubject(b.disciplina)));
    }
    function rawText(item){ return cleanText(item.tarefa || item.conteudo || item.texto); }
    function removeDeadline(t){
      return cleanText(t.replace(/Para:\s*\d{1,2}[\/-]\d{1,2}([\/-]\d{2,4})?/gi, "").replace(/\(\d{1,2}\/\d{1,2}\)/g, ""));
    }
    function cap(s, n=170){
      s = cleanText(s);
      return s.length > n ? s.slice(0,n).trim().replace(/[,.!?;:]?$/, "") + "..." : s;
    }
    function extractEssential(item){
      const text = rawText(item);
      const noDate = removeDeadline(text);
      const lower = noDate.toLowerCase();
      const parts = [];

      function add(label, pattern){
        const m = noDate.match(pattern);
        if(m && m[0]) parts.push(label + m[0].replace(/^[-•\s]+/, "").trim());
      }

      add("", /p(?:\.|ágina|áginas)\s*[^.]{1,90}/i);
      add("", /page\s*[^.]{1,70}/i);
      add("", /ex(?:\.|ercícios?)\s*[^.]{1,80}/i);
      add("", /realizar\s+[^.]{1,120}/i);
      add("", /ler\s+[^.]{1,120}/i);
      add("", /trazer\s+[^.]{1,140}/i);
      add("", /finalizar\s+[^.]{1,120}/i);
      add("", /pesquisa\s+[^.]{1,100}/i);
      add("", /trabalho avaliativo[^.]{0,100}/i);
      add("", /lapbook[^.]{0,90}/i);

      let unique = [];
      parts.forEach(p => {
        p = cleanText(p);
        if(p && !unique.some(u => u.toLowerCase() === p.toLowerCase())) unique.push(p);
      });

      if(lower.includes("não falte") || lower.includes("nao falte")){
        unique.unshift("Não falte");
      }

      if(!unique.length) return cap(noDate, 150);

      let result = unique.slice(0,3).join(" · ");
      result = result.replace(/\bPara:\s*$/i, "").trim();
      return cap(result, 180);
    }
    function urgencyBadge(item){
      if(!hasDate(item)) return {text:"Próxima aula", cls:"blue"};
      const d = diffDays(item);
      if(d === 0) return {text:"Hoje", cls:"red"};
      if(d === 1) return {text:"Amanhã", cls:"orange"};
      if(d <= 3) return {text:d + " dias", cls:"orange"};
      return {text:d + " dias", cls:"green"};
    }
    function itemKind(item){
      return item.tipo === "prova" ? "Avaliação" : "Lição";
    }

    const futureLessons = DATA_LICOES.filter(isFuture);
    const futureTests = DATA_PROVAS.filter(isFuture);
    const allFuture = sortItems([...futureLessons, ...futureTests]);
    const todayItems = allFuture.filter(i => hasDate(i) && diffDays(i) === 0);
    const tomorrowItems = allFuture.filter(i => hasDate(i) && diffDays(i) === 1);
    const laterLessons = sortItems(futureLessons.filter(i => hasDate(i) && diffDays(i) > 1));
    const laterTests = sortItems(futureTests.filter(i => hasDate(i) && diffDays(i) > 1));
    const openLessons = sortItems(futureLessons.filter(i => !hasDate(i)));
    const historyItems = sortItems([...DATA_LICOES, ...DATA_PROVAS].filter(isPast));

    document.addEventListener("DOMContentLoaded", function(){
      document.getElementById("updatedTop").textContent = ATUALIZADO;
      document.getElementById("footer").textContent = "pallusm.github.io/4a-provas · " + ATUALIZADO;
      render();
    });

    function render(){
      renderSummary();
      renderQuick();
      renderAlerts();
      renderSection("today", "Entrega ou atenção imediata", "Hoje", todayItems, "Nada para entregar hoje.", true);
      renderSection("tomorrow", "Deixar pronto para amanhã", "Amanhã", tomorrowItems, "Nada separado para amanhã.", true);
      renderSection("next", "Próximas lições", "Depois de amanhã em diante", laterLessons, "Sem lições futuras com prazo definido.", false);
      renderSection("open", "Próxima aula / sem data", "Quando a professora não colocou data exata", openLessons, "Sem tarefas abertas.", false);
      renderSection("tests", "Provas e trabalhos avaliativos", "Não deixar para última hora", laterTests, "Sem avaliações futuras.", true);
      renderHistory();
    }

    function renderSummary(){
      const urgent = todayItems.length + tomorrowItems.length;
      const tests = futureTests.length;
      const open = openLessons.length;
      const title = urgent > 0
        ? `Tem ${urgent} coisa(s) para resolver entre hoje e amanhã.`
        : `Hoje está mais tranquilo.`;
      const text = urgent > 0
        ? `Comece pelos itens de hoje, depois deixe o de amanhã pronto.`
        : `Mesmo assim, confira as próximas aulas e avaliações.`;
      document.getElementById("summary").innerHTML = `
        <div>
          <div class="summary-kicker">Resumo rápido dos pais</div>
          <div class="summary-title">${title}</div>
          <div class="summary-text">${text}</div>
        </div>
        <div class="summary-box">
          <div class="mini-row"><span class="mini-label">Para hoje</span><span class="mini-num">${todayItems.length}</span></div>
          <div class="mini-row"><span class="mini-label">Para amanhã</span><span class="mini-num">${tomorrowItems.length}</span></div>
          <div class="mini-row"><span class="mini-label">Avaliações</span><span class="mini-num">${tests}</span></div>
          <div class="mini-row"><span class="mini-label">Próxima aula</span><span class="mini-num">${open}</span></div>
        </div>`;
    }

    function renderQuick(){
      const rows = [];
      if(todayItems.length){
        rows.push(`<div class="quick-item"><div class="quick-icon">🔴</div><div><b>Hoje:</b> ${todayItems.map(i => `${shortSubject(i.disciplina)}: ${extractEssential(i)}`).join("; ")}</div></div>`);
      }
      if(tomorrowItems.length){
        rows.push(`<div class="quick-item"><div class="quick-icon">🟠</div><div><b>Amanhã:</b> ${tomorrowItems.map(i => `${shortSubject(i.disciplina)}: ${extractEssential(i)}`).join("; ")}</div></div>`);
      }
      if(futureTests.length){
        const t = sortItems(futureTests)[0];
        rows.push(`<div class="quick-item"><div class="quick-icon">📝</div><div><b>Próxima avaliação:</b> ${shortSubject(t.disciplina)} em ${dateLabel(t)} — ${extractEssential(t)}</div></div>`);
      }
      if(openLessons.length){
        rows.push(`<div class="quick-item"><div class="quick-icon">📘</div><div><b>Sem data exata:</b> ${openLessons.map(i => `${shortSubject(i.disciplina)}: ${extractEssential(i)}`).join("; ")}</div></div>`);
      }
      document.getElementById("quick").innerHTML = `<h2>O que eu preciso fazer com meu filho?</h2><div class="quick-list">${rows.join("") || `<div class="quick-item"><div class="quick-icon">✅</div><div><b>Nada urgente agora.</b> Confira novamente mais tarde.</div></div>`}</div>`;
    }

    function renderAlerts(){
      const el = document.getElementById("alerts");
      if(!DATA_ALERTAS.length){ el.innerHTML = ""; return; }
      const items = sortItems(DATA_ALERTAS.filter(isFuture)).slice(0,2);
      if(!items.length){ el.innerHTML = ""; return; }
      el.innerHTML = `<div class="alert"><div class="alert-title">Atenção especial</div><div class="alert-grid">${items.map(a => `<div class="alert-item"><b>${shortSubject(a.disciplina)} · ${dateLabel(a)}</b><p>${cap(extractEssential(a), 220)}</p></div>`).join("")}</div></div>`;
    }

    function renderSection(id, title, kicker, items, emptyMsg, priority){
      const el = document.getElementById(id);
      if(!el) return;
      el.innerHTML = `
        <div class="section-head">
          <div>
            <div class="kicker">${kicker}</div>
            <div class="section-title">${title}</div>
          </div>
          <div class="count">${items.length} item(s)</div>
        </div>
        <div class="cards">${items.length ? items.map(i => cardHTML(i, priority)).join("") : `<div class="empty"><b>${emptyMsg}</b><span>Se aparecer algo novo, entra automaticamente aqui.</span></div>`}</div>`;
    }

    function cardHTML(item, priority){
      const color = colorFor(item.disciplina);
      const badge = urgencyBadge(item);
      const text = rawText(item);
      const long = text.length > 420;
      const id = "txt-" + Math.random().toString(36).slice(2,9);
      return `<article class="card ${priority ? 'priority' : ''}" style="border-left-color:${color}">
        <div class="card-top">
          <div class="subject-line">
            <div class="subject" style="color:${color}">${shortSubject(item.disciplina)}</div>
            ${item.grupo ? `<span class="tag">${item.grupo}</span>` : ""}
            ${item.tipo === "prova" ? `<span class="badge red">Avaliação</span>` : `<span class="tag">Lição</span>`}
          </div>
          <span class="badge ${badge.cls}">${badge.text}</span>
        </div>
        <div class="date">${dateLabel(item)}</div>
        <div class="do-box"><span class="do-label">O que fazer</span>${extractEssential(item)}</div>
        <div class="details ${long ? 'clamped' : ''}" id="${id}">${text}</div>
        ${long ? `<button class="more" onclick="toggleDetails('${id}', this)">Ler detalhe original</button>` : ""}
        <div class="meta">
          ${item.fonte ? `<span>Aluno: ${item.fonte}</span>` : ""}
          ${item.linha_origem ? `<span>Registro ${item.linha_origem}</span>` : ""}
        </div>
      </article>`;
    }

    function toggleDetails(id, btn){
      const el = document.getElementById(id);
      if(!el) return;
      el.classList.toggle("clamped");
      btn.textContent = el.classList.contains("clamped") ? "Ler detalhe original" : "Mostrar menos";
    }

    function renderHistory(){
      const el = document.getElementById("history");
      el.innerHTML = historyItems.length
        ? historyItems.map(i => cardHTML(i, false)).join("")
        : `<div class="empty"><b>Sem histórico por enquanto.</b><span>As tarefas antigas aparecem aqui quando existirem.</span></div>`;
    }
    function toggleHistory(){
      const el = document.getElementById("history");
      const ar = document.getElementById("histArrow");
      el.classList.toggle("open");
      ar.textContent = el.classList.contains("open") ? "⌃" : "⌄";
    }
    function sharePage(){
      const text = `Agenda do 4ºA\nHoje: ${todayItems.length}\nAmanhã: ${tomorrowItems.length}\nAvaliações: ${futureTests.length}\nhttps://pallusm.github.io/4a-provas/`;
      if(navigator.share){ navigator.share({title:"Agenda do 4ºA", text, url:location.href}).catch(()=>{}); }
      else { navigator.clipboard.writeText(text).then(()=>alert("Resumo copiado.")); }
    }
  </script>
</body>
</html>
