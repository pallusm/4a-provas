<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1A3A6B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>4°A — Eduardo Gomes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --school:   #1A3A6B;
            --school-d: #142F58;
            --bg:       #F0F2F7;
            --surface:  #FFFFFF;
            --border:   #E2E6EF;
            --text:     #111827;
            --muted:    #6B7280;
            --accent:   #F59E0B;
            --danger:   #DC2626;
            --warn:     #D97706;
            --safe:     #16A34A;
            --radius:   14px;
            --touch:    48px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html { font-size: 16px; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ──────────────────────────────────────────────────────── */
        header {
            background: var(--school);
            color: white;
            padding: 16px 16px 0;
            padding-top: calc(16px + env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 16px rgba(26,58,107,0.35);
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .school-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .header-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .update-badge {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            min-height: var(--touch);
            transition: opacity 0.15s;
            -webkit-appearance: none;
        }

        .share-btn:active { opacity: 0.8; }

        /* ── Tabs ────────────────────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.55);
            border: none;
            padding: 10px 16px;
            border-radius: 8px 8px 0 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 42px;
            transition: all 0.2s;
        }

        .tab-btn.active { background: var(--bg); color: var(--text); }

        .pill {
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
        }

        .tab-btn:not(.active) .pill { background: rgba(255,255,255,0.25); }

        /* ── Summary bar ─────────────────────────────────────────────────── */
        .summary-bar {
            background: var(--school-d);
            padding: 10px 16px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .summary-bar::-webkit-scrollbar { display: none; }

        .sum-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 12px;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            flex-shrink: 0;
        }

        .sum-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Controls ────────────────────────────────────────────────────── */
        .controls {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .controls::-webkit-scrollbar { display: none; }

        .view-toggle {
            display: flex;
            background: var(--bg);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
            flex-shrink: 0;
        }

        .view-btn {
            background: none;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            min-height: var(--touch);
            transition: all 0.15s;
            white-space: nowrap;
        }

        .view-btn.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .filter-btn {
            border: 2px solid var(--border);
            background: var(--surface);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: var(--muted);
            min-height: var(--touch);
            white-space: nowrap;
            transition: all 0.15s;
            -webkit-appearance: none;
        }

        /* ── Tab content ─────────────────────────────────────────────────── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
        }

        /* ── Section headers ─────────────────────────────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 10px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .section-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
        }

        /* ── Alert carousel ──────────────────────────────────────────────── */
        .alert-wrapper { position: relative; }

        .alert-carousel { overflow: hidden; border-radius: var(--radius); }

        .alert-track {
            display: flex;
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
        }

        .alert-card {
            background: linear-gradient(135deg,#FEF2F2 0%,#FFF5F5 100%);
            border: 2px solid #FCA5A5;
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            flex: 0 0 100%;
            width: 100%;
        }

        .alert-icon { font-size: 20px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
        .alert-body { flex: 1; min-width: 0; }

        .alert-label {
            font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--danger); margin-bottom: 3px;
        }

        .alert-disc { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

        .alert-text {
            font-size: 13px; color: #374151; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .alert-date {
            font-family: 'DM Mono', monospace; font-size: 11px;
            color: var(--danger); font-weight: 600; margin-top: 6px;
        }

        .alert-footer {
            display: flex; align-items: center;
            justify-content: space-between; margin-top: 10px;
        }

        .alert-dots { display: flex; gap: 5px; align-items: center; }

        .alert-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #FCA5A5; cursor: pointer;
            transition: all 0.2s;
        }

        .alert-dot.active { width: 18px; border-radius: 3px; background: var(--danger); }

        .alert-btns { display: flex; gap: 6px; align-items: center; }

        .alert-nav-btn {
            background: none; border: 1.5px solid #FCA5A5; color: var(--danger);
            width: 32px; height: 32px; border-radius: 50%; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; -webkit-appearance: none;
        }

        .alert-nav-btn:active { background: #FEF2F2; }
        .alert-nav-btn:disabled { opacity: 0.3; cursor: default; }

        .alert-close-btn {
            background: var(--danger); color: white; border: none;
            padding: 6px 14px; border-radius: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px; font-weight: 700; cursor: pointer;
            transition: opacity 0.15s; -webkit-appearance: none;
        }

        .alert-close-btn:active { opacity: 0.8; }

        /* ── Cards ───────────────────────────────────────────────────────── */
        .cards-grid { display: grid; gap: 8px; }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--disc-color, #CBD5E0);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            }
        }

        .card.prova { background: linear-gradient(135deg, #FFF5F5 0%, white 60%); }
        .card.history { opacity: 0.75; }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }

        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

        .disc-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .tipo-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            background: #FEF2F2;
            color: var(--danger);
        }

        .urg-tag {
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .card-date {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .card-text {
            font-size: 14px;
            line-height: 1.7;
            color: #374151;
        }

        /* ── Histórico toggle ────────────────────────────────────────────── */
        .history-toggle {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            min-height: var(--touch);
            margin-top: 20px;
            transition: all 0.15s;
            -webkit-appearance: none;
        }

        .history-toggle:active { background: var(--bg); }

        .history-arrow { font-size: 16px; transition: transform 0.2s; }
        .history-arrow.open { transform: rotate(180deg); }

        .history-section { display: none; margin-top: 8px; }
        .history-section.open { display: block; }

        /* ── Calendário ──────────────────────────────────────────────────── */
        .cal-view { display: none; }
        .cal-view.active-view { display: block; }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .cal-nav {
            background: var(--surface);
            border: 1px solid var(--border);
            width: var(--touch);
            height: var(--touch);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: all 0.15s;
            -webkit-appearance: none;
        }

        .cal-nav:active { background: var(--school); color: white; }

        .cal-month { font-size: 17px; font-weight: 800; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cal-dow {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            color: var(--muted);
            padding: 4px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .cal-day {
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: all 0.15s;
            min-height: 44px;
        }

        .cal-day.empty { background: transparent; border-color: transparent; }
        .cal-day.today { border-color: var(--school); border-width: 2px; }
        .cal-day.has-items { cursor: pointer; }
        .cal-day.has-items:active { background: var(--bg); }

        .cal-num {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            line-height: 1;
        }

        .cal-day.today .cal-num { color: var(--school); }

        .cal-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
        }

        .cal-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
        }

        /* ── Drawer ──────────────────────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .overlay.open { display: flex; }

        .drawer {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 12px 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .drawer-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .drawer-date {
            font-size: 13px;
            font-weight: 800;
            color: var(--school);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        /* ── Empty ───────────────────────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .empty-icon { font-size: 44px; margin-bottom: 12px; }
        .empty p { font-size: 15px; line-height: 1.6; }

        /* ── Footer ──────────────────────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 24px 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            font-size: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div>
            <div class="school-label">Colégio Eduardo Gomes · Fund. Manhã</div>
            <div class="header-title">4°A — Agenda Escolar</div>
        </div>
        <div class="header-actions">
            <div class="update-badge" id="update-time"></div>
            <button class="share-btn" onclick="compartilhar()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3 0-.6 0-.9.1l-2.1-1.5c.1-.3.1-.7.1-1s0-.7-.1-1l2.1-1.5c.3.1.6.1.9.1 1.5 0 2.8-1.3 2.8-2.8S19 4 17.5 4 14.7 5.3 14.7 6.8c0 .3 0 .7.1 1l-2.1 1.5c-.5-.4-1.2-.7-1.9-.7s-1.4.3-1.9.7L6.8 7.8c.1-.3.1-.7.1-1C6.9 5.3 5.6 4 4.1 4S1.3 5.3 1.3 6.8 2.6 9.6 4.1 9.6c.3 0 .6 0 .9-.1l2.1 1.5c-.1.3-.1.7-.1 1s0 .7.1 1L4.9 14.5c-.3-.1-.6-.1-.9-.1-1.5 0-2.8 1.3-2.8 2.8S3.5 20 5 20s2.8-1.3 2.8-2.8c0-.3 0-.7-.1-1l2.1-1.5c.5.4 1.2.7 1.9.7s1.4-.3 1.9-.7l2.1 1.5c-.1.3-.1.7-.1 1 0 1.5 1.3 2.8 2.8 2.8s2.8-1.3 2.8-2.8-1.2-2.8-2.7-2.8z"/></svg>
                Compartilhar
            </button>
        </div>
    </div>
    <div class="tabs" id="tabs">
        <button class="tab-btn active" onclick="trocarAba('proximas',this)">
            📅 Próximas <span class="pill" id="pill-prox">0</span>
        </button>
        <button class="tab-btn" onclick="trocarAba('historico',this)">
            📚 Histórico <span class="pill" id="pill-hist">0</span>
        </button>
    </div>
</header>

<div class="summary-bar" id="summary-bar"></div>

<div class="controls">
    <div class="view-toggle">
        <button class="view-btn active" id="btn-lista" onclick="trocarView('lista')">Lista</button>
        <button class="view-btn" id="btn-cal" onclick="trocarView('cal')">Calendário</button>
    </div>
    <div class="filters" id="filtros"></div>
</div>

<!-- Aba Próximas -->
<div id="tab-proximas" class="tab-content active">
    <div class="container">
        <div id="alertas-section"></div>

        <div class="section-header">
            <span class="section-title">📋 Lições de Casa</span>
            <span class="section-count" id="count-lic"></span>
        </div>
        <div class="cards-grid" id="cards-licoes"></div>
        <div class="cal-view" id="cal-licoes"></div>

        <div class="section-header" style="margin-top:24px">
            <span class="section-title">📝 Provas & Avaliações</span>
            <span class="section-count" id="count-prov"></span>
        </div>
        <div class="cards-grid" id="cards-provas"></div>
        <div class="cal-view" id="cal-provas"></div>
    </div>
</div>

<!-- Aba Histórico -->
<div id="tab-historico" class="tab-content">
    <div class="container">
        <button class="history-toggle" onclick="toggleHistorico('hist-lic')">
            <span>📚 Lições anteriores</span>
            <span class="history-arrow" id="arrow-hist-lic">▼</span>
        </button>
        <div class="history-section" id="hist-lic">
            <div class="cards-grid" id="hist-cards-licoes"></div>
        </div>

        <button class="history-toggle" onclick="toggleHistorico('hist-prov')">
            <span>📝 Provas anteriores</span>
            <span class="history-arrow" id="arrow-hist-prov">▼</span>
        </button>
        <div class="history-section" id="hist-prov">
            <div class="cards-grid" id="hist-cards-provas"></div>
        </div>
    </div>
</div>

<footer>pallusm.github.io/4a-provas · Atualizado automaticamente</footer>

<!-- Drawer -->
<div class="overlay" id="overlay" onclick="fecharDrawer(event)">
    <div class="drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-date" id="drawer-date"></div>
        <div id="drawer-content"></div>
    </div>

const DATA_ALERTAS = [{"disciplina": "Língua Portuguesa", "texto": "- 4ª Proposta da Roda de Leitura – Para: 21/05 Oi, meus queridos alunos! Chegou a hora de mais um desafio criativo e muito especial! Nesta proposta, vocês irão escolher o personagem de que mais gostaram (ou acharam mais interessante) da história lida e criar uma ficha de personagem criativa, como se estivessem apresentando esse personagem para outras pessoas. Como fazer: Leia a história com atenção; Escolha um personagem marcante; Pense em suas características, gostos e jeito de ser; Monte uma a", "prazo": "2026-05-21"}];
const ATUALIZADO   = "18/05/2026 às 12:55";

// Cores por disciplina
const CORES = {
    "matemática":  { color:"#2563EB", bg:"#EFF6FF" },
    "português":   { color:"#16A34A", bg:"#F0FDF4" },
    "língua":      { color:"#16A34A", bg:"#F0FDF4" },
    "história":    { color:"#DC2626", bg:"#FEF2F2" },
    "geografia":   { color:"#7C3AED", bg:"#F5F3FF" },
    "ciências":    { color:"#EA580C", bg:"#FFF7ED" },
    "arte":        { color:"#DB2777", bg:"#FDF2F8" },
    "física":      { color:"#059669", bg:"#ECFDF5" },
    "tecnológica": { color:"#4F46E5", bg:"#EEF2FF" },
    "inglês":      { color:"#0891B2", bg:"#ECFEFF" },
    "l.e.m":       { color:"#0891B2", bg:"#ECFEFF" },
    "projeto":     { color:"#B45309", bg:"#FFFBEB" },
};

function getCor(d) {
    const dl = (d||"").toLowerCase();
    for (const [k,v] of Object.entries(CORES)) if (dl.includes(k)) return v;
    return { color:"#6B7280", bg:"#F9FAFB" };
}

function nomeCurto(d) {
    const dl = (d||"").toLowerCase();
    if (dl.includes("matemática"))  return "Matemática";
    if (dl.includes("português") || dl.includes("língua")) return "Português";
    if (dl.includes("história"))    return "História";
    if (dl.includes("geografia"))   return "Geografia";
    if (dl.includes("ciências"))    return "Ciências";
    if (dl.includes("arte"))        return "Arte";
    if (dl.includes("física"))      return "Ed. Física";
    if (dl.includes("tecnológica")) return "Tecnologia";
    if (dl.includes("inglês") || dl.includes("l.e.m")) return "Inglês";
    if (dl.includes("projeto"))     return "Proj. Vida";
    return d.split(" ")[0];
}

function diffDias(prazo) {
    const p = new Date(prazo+"T12:00:00");
    const h = new Date(); h.setHours(0,0,0,0);
    return Math.round((p-h)/86400000);
}

function urgTag(diff) {
    if (diff === 0)  return { label:"🔴 Hoje",        color:"#DC2626" };
    if (diff === 1)  return { label:"🟠 Amanhã",      color:"#D97706" };
    if (diff <= 3)   return { label:`🟡 ${diff} dias`, color:"#D97706" };
    if (diff <= 7)   return { label:`🟢 ${diff} dias`, color:"#16A34A" };
    return               { label:`🔵 ${diff} dias`, color:"#2563EB" };
}

function dataStr(prazo) {
    const d  = new Date(prazo+"T12:00:00");
    const ds = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()];
    return `${ds}, ${d.toLocaleDateString("pt-BR")}`;
}

function limpar(t) {
    return (t||"").replace(/^[-•\s]+/,"").replace(/\s+/g," ").trim();
}

// Estado
let abaAtiva    = "proximas";
let viewAtiva   = "lista";
let filtroAtivo = "Todos";
let calMes      = new Date().getMonth();
let calAno      = new Date().getFullYear();

// Init
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("update-time").textContent = ATUALIZADO;

    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const licFut  = DATA_LICOES.filter(i => diffDias(i.prazo) >= 0);
    const provFut = DATA_PROVAS.filter(i => diffDias(i.prazo) >= 0);
    const licHist = DATA_LICOES.filter(i => diffDias(i.prazo) < 0);
    const provHist= DATA_PROVAS.filter(i => diffDias(i.prazo) < 0);

    document.getElementById("pill-prox").textContent = licFut.length + provFut.length;
    document.getElementById("pill-hist").textContent = licHist.length + provHist.length;
    document.getElementById("count-lic").textContent  = licFut.length + " pendente(s)";
    document.getElementById("count-prov").textContent = provFut.length + " pendente(s)";

    renderSummary(licFut, provFut);
    renderAlertas();
    renderCards("cards-licoes",  licFut,  false);
    renderCards("cards-provas",  provFut, true);
    renderCards("hist-cards-licoes",  licHist,  false, true);
    renderCards("hist-cards-provas",  provHist, true,  true);
    renderFiltros(licFut, provFut);
    renderCal("cal-licoes", licFut);
    renderCal("cal-provas", provFut);
});

function renderSummary(licFut, provFut) {
    const todos  = [...licFut, ...provFut];
    const nHoje  = todos.filter(i => diffDias(i.prazo) === 0).length;
    const nAmanha= todos.filter(i => diffDias(i.prazo) === 1).length;
    const nSemana= todos.filter(i => diffDias(i.prazo) <= 7 && diffDias(i.prazo) >= 0).length;
    const nAlert = DATA_ALERTAS.length;

    document.getElementById("summary-bar").innerHTML = `
        ${nAlert > 0 ? `<div class="sum-chip"><span class="sum-dot" style="background:#FCA5A5"></span>⚠️ ${nAlert} alerta(s)</div>` : ""}
        <div class="sum-chip"><span class="sum-dot" style="background:#FCA5A5"></span>Hoje: <b>${nHoje}</b></div>
        <div class="sum-chip"><span class="sum-dot" style="background:#FCD34D"></span>Amanhã: <b>${nAmanha}</b></div>
        <div class="sum-chip"><span class="sum-dot" style="background:#93C5FD"></span>Semana: <b>${nSemana}</b></div>
        <div class="sum-chip" style="margin-left:auto"><span style="opacity:.7">${licFut.length} lições · ${provFut.length} provas</span></div>
    `;
}

function renderAlertas() {
    const sec = document.getElementById("alertas-section");
    if (!DATA_ALERTAS.length) { sec.innerHTML = ""; return; }

    sec.innerHTML = `
        <div class="section-header"><span class="section-title" style="color:#DC2626">⚠️ Atenção</span><span class="section-count" style="color:#DC2626">${DATA_ALERTAS.length} aviso(s)</span></div>
        <div class="alert-wrapper">
            <div class="alert-carousel">
                <div class="alert-track" id="alert-track">
                    ${DATA_ALERTAS.map(a => `
                    <div class="alert-card">
                        <div class="alert-icon">🚨</div>
                        <div class="alert-body">
                            <div class="alert-label">Aviso importante</div>
                            <div class="alert-disc">${nomeCurto(a.disciplina)}</div>
                            <div class="alert-text">${limpar(a.texto)}</div>
                            ${a.prazo ? `<div class="alert-date">📅 ${dataStr(a.prazo)}</div>` : ""}
                        </div>
                    </div>`).join("")}
                </div>
            </div>
            <div class="alert-footer">
                <div class="alert-dots" id="alert-dots">
                    ${DATA_ALERTAS.map((_,i) => `<div class="alert-dot${i===0?" active":""}" onclick="irAlerta(${i})"></div>`).join("")}
                </div>
                <div class="alert-btns">
                    <button class="alert-nav-btn" id="alert-prev" onclick="navAlerta(-1)" disabled>‹</button>
                    <button class="alert-nav-btn" id="alert-next" onclick="navAlerta(1)" ${DATA_ALERTAS.length<=1?"disabled":""}>›</button>
                    <button class="alert-close-btn" onclick="fecharAlertas()">Fechar todos ✕</button>
                </div>
            </div>
        </div>`;
}

let alertaAtual = 0;

function navAlerta(dir) {
    irAlerta(alertaAtual + dir);
}

function irAlerta(idx) {
    const total = DATA_ALERTAS.length;
    alertaAtual = Math.max(0, Math.min(idx, total - 1));
    const track = document.getElementById("alert-track");
    if (track) track.style.transform = `translateX(-${alertaAtual * 100}%)`;
    document.querySelectorAll(".alert-dot").forEach((d,i) => d.classList.toggle("active", i===alertaAtual));
    const prev = document.getElementById("alert-prev");
    const next = document.getElementById("alert-next");
    if (prev) prev.disabled = alertaAtual === 0;
    if (next) next.disabled = alertaAtual === total - 1;
}

function fecharAlertas() {
    const sec = document.getElementById("alertas-section");
    if (sec) { sec.style.transition = "opacity 0.3s"; sec.style.opacity = "0"; setTimeout(() => sec.style.display="none", 300); }
}

function renderCards(containerId, itens, isProva, isHistory=false) {
    const c = document.getElementById(containerId);
    if (!c) return;
    if (!itens.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">${isHistory ? "📂" : "✅"}</div><p>${isHistory ? "Nenhum registro anterior." : "Tudo em dia!"}</p></div>`;
        return;
    }
    c.innerHTML = itens.map(item => {
        const cor   = getCor(item.disciplina);
        const texto = limpar(item.tarefa || item.conteudo || "");
        const diff  = diffDias(item.prazo);
        const urg   = urgTag(diff);
        const nome  = nomeCurto(item.disciplina);
        return `
        <div class="card${isProva?" prova":""}${isHistory?" history":""}\" style="--disc-color:${cor.color}">
            <div class="card-top">
                <div class="card-tags">
                    <span class="disc-tag" style="background:${cor.bg};color:${cor.color}">${nome}</span>
                    ${isProva ? '<span class="tipo-tag">📝 Avaliação</span>' : ""}
                </div>
                ${!isHistory ? `<span class="urg-tag" style="color:${urg.color}">${urg.label}</span>` : ""}
            </div>
            <div class="card-date">${dataStr(item.prazo)}</div>
            <div class="card-text">${texto}</div>
        </div>`;
    }).join("");
}

function renderFiltros(licFut, provFut) {
    const todos = [...(licFut||[]), ...(provFut||[])];
    const discs = [...new Set(todos.map(i => nomeCurto(i.disciplina)))];
    const c = document.getElementById("filtros");
    c.innerHTML = ["Todos", ...discs].map(d => {
        const cor    = d === "Todos" ? null : getCor(d);
        const isAtivo = d === filtroAtivo;
        let style = "";
        let cls   = "filter-btn";
        if (d === "Todos") {
            style = isAtivo ? "background:var(--school);border-color:var(--school);color:white" : "border-color:var(--school);color:var(--school)";
        } else if (cor) {
            style = isAtivo
                ? `background:${cor.color};border-color:${cor.color};color:white`
                : `border-color:${cor.color};color:${cor.color}`;
        }
        return `<button class="${cls}" style="${style}" onclick="filtrar('${d}')">${d}</button>`;
    }).join("");
}

function filtrar(d) {
    filtroAtivo = d;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const licFut  = DATA_LICOES.filter(i => diffDias(i.prazo) >= 0 && (d==="Todos"||nomeCurto(i.disciplina)===d));
    const provFut = DATA_PROVAS.filter(i => diffDias(i.prazo) >= 0 && (d==="Todos"||nomeCurto(i.disciplina)===d));
    renderCards("cards-licoes", licFut, false);
    renderCards("cards-provas", provFut, true);
    renderFiltros(licFut, provFut);
    renderCal("cal-licoes", licFut);
    renderCal("cal-provas", provFut);
    document.getElementById("count-lic").textContent  = licFut.length  + " pendente(s)";
    document.getElementById("count-prov").textContent = provFut.length + " pendente(s)";
}

// Calendário
function renderCal(id, itens) {
    const c = document.getElementById(id);
    if (!c) return;
    const porData = {};
    itens.forEach(i => { if(!porData[i.prazo]) porData[i.prazo]=[]; porData[i.prazo].push(i); });

    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const dias  = ["D","S","T","Q","Q","S","S"];
    const hoje  = new Date();
    const primeiro = new Date(calAno, calMes, 1);
    const inicio   = new Date(primeiro);
    inicio.setDate(1 - primeiro.getDay());

    let html = `
    <div class="cal-header">
        <button class="cal-nav" onclick="navMes(-1,'${id}',${JSON.stringify(itens).replace(/"/g,"&quot;")})">‹</button>
        <span class="cal-month">${meses[calMes]} ${calAno}</span>
        <button class="cal-nav" onclick="navMes(1,'${id}',${JSON.stringify(itens).replace(/"/g,"&quot;")})">›</button>
    </div>
    <div class="cal-grid">
        ${dias.map(d=>`<div class="cal-dow">${d}</div>`).join("")}`;

    const cur = new Date(inicio);
    for (let w=0; w<6; w++) {
        for (let d=0; d<7; d++) {
            const same  = cur.getMonth() === calMes;
            const today = cur.toDateString() === hoje.toDateString();
            const key   = cur.toISOString().split("T")[0];
            const items = porData[key]||[];
            const has   = items.length > 0;

            let cls = "cal-day";
            if (!same) cls += " empty";
            if (today) cls += " today";
            if (has)   cls += " has-items";

            const click = has ? `onclick="abrirDrawer('${key}',${JSON.stringify(items).replace(/"/g,"&quot;")})"` : "";
            const dots  = items.slice(0,4).map(i=>`<span class="cal-dot" style="background:${getCor(i.disciplina).color}"></span>`).join("");

            html += `<div class="${cls}" ${click}>
                ${same ? `<div class="cal-num">${cur.getDate()}</div>` : ""}
                ${same && has ? `<div class="cal-dots">${dots}</div>` : ""}
            </div>`;
            cur.setDate(cur.getDate()+1);
        }
        if (cur.getMonth()!==calMes && w>=3) break;
    }

    c.innerHTML = html + "</div>";
}

function navMes(dir, id, itens) {
    calMes += dir;
    if (calMes>11){calMes=0;calAno++;}
    if (calMes<0) {calMes=11;calAno--;}
    renderCal(id, itens);
}

function abrirDrawer(key, itens) {
    const d    = new Date(key+"T12:00:00");
    const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
    const mes  = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][d.getMonth()];
    document.getElementById("drawer-date").textContent = `${dias[d.getDay()]}, ${d.getDate()} de ${mes}`;
    document.getElementById("drawer-content").innerHTML = itens.map(item => {
        const cor = getCor(item.disciplina);
        const isProva = !!item.conteudo;
        return `<div class="card${isProva?" prova":""}" style="--disc-color:${cor.color};margin-bottom:8px">
            <div class="card-tags" style="margin-bottom:8px">
                <span class="disc-tag" style="background:${cor.bg};color:${cor.color}">${nomeCurto(item.disciplina)}</span>
                ${isProva?'<span class="tipo-tag">📝 Avaliação</span>':""}
            </div>
            <div class="card-text">${limpar(item.tarefa||item.conteudo||"")}</div>
        </div>`;
    }).join("");
    document.getElementById("overlay").classList.add("open");
}

function fecharDrawer(e) {
    if (e.target===document.getElementById("overlay"))
        document.getElementById("overlay").classList.remove("open");
}

function trocarAba(nome, btn) {
    abaAtiva = nome;
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.getElementById("tab-"+nome).classList.add("active");
    btn.classList.add("active");
}

function trocarView(v) {
    viewAtiva = v;
    document.getElementById("btn-lista").classList.toggle("active", v==="lista");
    document.getElementById("btn-cal").classList.toggle("active",   v==="cal");
    ["licoes","provas"].forEach(a => {
        const cards = document.getElementById("cards-"+a);
        const cal   = document.getElementById("cal-"+a);
        if(cards) cards.style.display = v==="lista"?"grid":"none";
        if(cal)   cal.classList.toggle("active-view", v==="cal");
    });
}

function toggleHistorico(id) {
    const sec   = document.getElementById(id);
    const arrow = document.getElementById("arrow-"+id);
    sec.classList.toggle("open");
    arrow.classList.toggle("open");
}
